<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>空调体感反馈</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; display:flex; justify-content:center; padding:20px; min-height:100vh; }
    .frame { width:375px; min-height:667px; background:#1a1a2e; border-radius:40px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.08); position:relative; font-family:'PingFang SC',-apple-system,sans-serif; }
    .page { padding:30px 18px 40px; }
    .select-page { display:flex; flex-direction:column; align-items:center; }
    .select-logo { font-size:60px; margin-bottom:12px; }
    .select-title { font-size:24px; font-weight:700; color:#e8eaf0; margin-bottom:6px; }
    .select-hint { font-size:13px; color:#7a8a9a; margin-bottom:26px; }
    .options-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:28px; }
    .option-card { background:rgba(255,255,255,.06); border-radius:14px; padding:18px 14px; text-align:center; border:2px solid transparent; cursor:pointer; transition:all .2s; }
    .option-card:hover { background:rgba(255,255,255,.1); }
    .option-card.selected { background:rgba(255,255,255,.14); transform:scale(1.02); }
    .option-emoji { display:block; font-size:36px; margin-bottom:6px; }
    .option-text { display:block; font-size:18px; font-weight:600; color:#e8eaf0; margin-bottom:4px; }
    .option-desc { display:block; font-size:12px; color:#8899aa; }
    .confirm-btn { width:100%; max-width:280px; height:52px; background:rgba(255,255,255,.1); border-radius:26px; display:flex; align-items:center; justify-content:center; transition:all .3s; pointer-events:none; opacity:.5; }
    .confirm-btn.active { background:linear-gradient(135deg,#00b894,#00d4a0); box-shadow:0 6px 18px rgba(0,184,148,.3); pointer-events:auto; opacity:1; }
    .confirm-btn span { font-size:17px; font-weight:600; color:#667; }
    .confirm-btn.active span { color:#fff; }
    .result-page { display:none; flex-direction:column; align-items:center; }
    .result-page.show { display:flex; }
    .your-feeling { text-align:center; margin-bottom:22px; }
    .yf-label { display:block; font-size:14px; color:#8899aa; margin-bottom:8px; }
    .yf-emoji { display:block; font-size:56px; margin-bottom:6px; }
    .yf-text { display:block; font-size:30px; font-weight:700; }
    .feedback-card { width:100%; border-radius:18px; padding:36px 28px 32px; text-align:center; box-shadow:0 12px 36px rgba(0,0,0,.45); margin-bottom:20px; transition:background .5s; }
    .fb-emoji { display:block; font-size:70px; margin-bottom:12px; }
    .fb-title { display:block; font-size:36px; font-weight:800; margin-bottom:12px; }
    .fb-desc { display:block; font-size:15px; color:#ccdde8; line-height:1.6; }
    .extra-tips { width:100%; background:rgba(255,255,255,.06); border-radius:16px; padding:18px 20px; margin-bottom:22px; }
    .tip-item { display:flex; align-items:flex-start; gap:10px; }
    .tip-icon { font-size:20px; line-height:1.5; flex-shrink:0; }
    .tip-text { font-size:13px; color:#aabbc8; line-height:1.7; flex:1; }
    .divider { height:1px; background:rgba(255,255,255,.08); margin:10px 0; }
    .reset-btn { padding:10px 28px; border:1px solid rgba(255,255,255,.2); border-radius:36px; background:rgba(255,255,255,.05); cursor:pointer; }
    .reset-btn:hover { background:rgba(255,255,255,.1); }
    .reset-btn span { font-size:13px; color:#8899aa; }
    .mqtt-status { position:fixed; bottom:14px; right:14px; padding:6px 12px; border-radius:20px; font-size:11px; display:flex; align-items:center; gap:6px; background:rgba(0,0,0,.6); color:#aaa; backdrop-filter:blur(6px); }
    .mqtt-dot { width:7px; height:7px; border-radius:50%; background:#666; }
    .mqtt-status.connected .mqtt-dot { background:#00b894; box-shadow:0 0 6px #00b894; }
    .mqtt-status.error .mqtt-dot { background:#e17055; }
    .sent-toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px); background:rgba(0,184,148,.9); color:#fff; padding:10px 22px; border-radius:30px; font-size:13px; font-weight:600; transition:transform .35s ease; white-space:nowrap; pointer-events:none; }
    .sent-toast.show { transform:translateX(-50%) translateY(0); }
    .source-badge { display:none; align-items:center; gap:7px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:20px; padding:6px 14px; margin-bottom:16px; font-size:13px; color:#ccdde8; }
    .source-badge.show { display:flex; }
    .source-dot { width:8px; height:8px; border-radius:50%; background:#00b894; box-shadow:0 0 6px #00b894; flex-shrink:0; }
  </style>
</head>
<body>
<div class="frame">
  <div class="page">
    <div class="select-page" id="selectPage">
      <div class="select-logo">🌡️</div>
      <div class="source-badge" id="sourceBadge"><div class="source-dot"></div><span id="sourceText"></span></div>
      <span class="select-title">你现在感觉怎么样？</span>
      <span class="select-hint">选择最符合你当前感受的选项</span>
      <div class="options-grid" id="optionsGrid"></div>
      <div class="confirm-btn" id="confirmBtn" onclick="doConfirm()">
        <span>查看建议</span>
      </div>
    </div>
    <div class="result-page" id="resultPage">
      <div class="your-feeling">
        <span class="yf-label">你选择了</span>
        <span class="yf-emoji" id="yfEmoji"></span>
        <span class="yf-text" id="yfText"></span>
      </div>
      <div class="feedback-card" id="feedbackCard">
        <span class="fb-emoji" id="fbEmoji"></span>
        <span class="fb-title" id="fbTitle"></span>
        <span class="fb-desc" id="fbDesc"></span>
      </div>
      <div class="extra-tips">
        <div class="tip-item"><span class="tip-icon">👕</span><span class="tip-text" id="clothTip"></span></div>
        <div class="divider"></div>
        <div class="tip-item"><span class="tip-icon">⚡</span><span class="tip-text" id="energyTip"></span></div>
      </div>
      <div class="reset-btn" onclick="doReset()"><span>重新选择感受</span></div>
    </div>
  </div>
</div>

<div class="mqtt-status" id="mqttStatus">
  <div class="mqtt-dot"></div>
  <span id="mqttStatusText">连接中...</span>
</div>
<div class="sent-toast" id="sentToast">✅ 反馈已上传</div>

<script>
const OPTIONS = [
  {feeling:'很冷',   emoji:'🥶', color:'#74b9ff', bg:'linear-gradient(145deg,#0a1628,#1a3a5c)', reason:'你现在感觉很冷，建议把空调调高一点，让室温回升', cloth:'先穿上外套或毛衣保暖，等温度上来再脱', energy:'每调高1°C可节省约6%电费，既舒适又省电'},
  {feeling:'有点冷', emoji:'🌨️', color:'#a29bfe', bg:'linear-gradient(145deg,#12162a,#1e2a4a)', reason:'稍微偏凉，调高1-2度会更舒适', cloth:'可以加件薄外套，或者把空调调到25°C', energy:'25°C是兼顾舒适和节能的好选择'},
  {feeling:'微凉',   emoji:'🌤️', color:'#55efc4', bg:'linear-gradient(145deg,#0d2030,#0f3040)', reason:'这个感觉刚好清爽，适合保持或微调', cloth:'长袖衫就很舒服，不需要额外加衣', energy:'24°C是推荐的节能温度，继续保持！'},
  {feeling:'刚刚好', emoji:'😊', color:'#00b894', bg:'linear-gradient(145deg,#0d2a20,#0f3828)', reason:'完美！这就是最舒适的体感温度', cloth:'现在的穿着正合适，不需要调整', energy:'当前设置很完美，无需改动，继续保持 ✅'},
  {feeling:'有点暖', emoji:'🌞', color:'#fdcb6e', bg:'linear-gradient(145deg,#2a1f0a,#3a2a10)', reason:'稍微偏热，调低1-2度会更清爽', cloth:'穿短袖即可，或者把空调调到23-24°C', energy:'调低温度会增加耗电，建议优先穿轻薄衣物'},
  {feeling:'有点热', emoji:'😅', color:'#e17055', bg:'linear-gradient(145deg,#2a1510,#3a1a0a)', reason:'明显偏热，建议把空调调低一些', cloth:'换成短袖短裤，同时把空调调到22-23°C', energy:'建议先检查空调滤网是否干净，影响制冷效果'},
  {feeling:'很热',   emoji:'🥵', color:'#e84393', bg:'linear-gradient(145deg,#2a0d18,#3a0a20)', reason:'相当热！空调可能需要调低3-4度', cloth:'穿最轻薄的衣物，多喝水补充水分', energy:'如果调到20°C还是热，建议检查空调是否需要清洗'},
  {feeling:'极热',   emoji:'🔥', color:'#d63031', bg:'linear-gradient(145deg,#2a0808,#3a0a0a)', reason:'极度炎热！空调可能需要维修或清洗', cloth:'穿最少衣物，立即补水，避免中暑', energy:'⚠️ 如果18°C还不凉快，请立即联系空调维修'}
]

// MQTT 配置
const BROKER   = 'wss://broker.hivemq.com:8884/mqtt'
const TOPIC    = 'ac-feedback/responses'          // 单条消息
const TOPIC_STAT = 'ac-feedback/stats'             // retained 统计（看板恢复用）
const CLIENT_ID = 'web-' + Math.random().toString(16).slice(2,10)

// ── 读取来源参数 ─────────────────────────────────────
const URL_PARAMS = new URLSearchParams(window.location.search)
const SOURCE     = URL_PARAMS.get('from') || ''   // 如: ?from=A栋大厅
const SOURCE_LABEL = SOURCE ? decodeURIComponent(SOURCE) : ''

// 显示来源标签
if (SOURCE_LABEL) {
  document.getElementById('sourceText').textContent = '来自：' + SOURCE_LABEL
  document.getElementById('sourceBadge').classList.add('show')
}

let client = null
let selected = -1

// 本地统计（用于更新 retained 统计消息）
const STAT_KEY = 'ac_stats_v1'
function loadStats() {
  try { return JSON.parse(localStorage.getItem(STAT_KEY)) || {} } catch(e) { return {} }
}
function saveStats(stats) {
  localStorage.setItem(STAT_KEY, JSON.stringify(stats))
}

function initMQTT() {
  client = mqtt.connect(BROKER, { clientId: CLIENT_ID, clean: true, connectTimeout: 8000, reconnectPeriod: 3000 })
  client.on('connect', () => setStatus('connected','已连接'))
  client.on('error',   () => setStatus('error','连接失败'))
  client.on('reconnect', () => setStatus('','重连中...'))
  client.on('close',   () => setStatus('error','已断开'))
}

function setStatus(cls, text) {
  document.getElementById('mqttStatus').className = 'mqtt-status ' + cls
  document.getElementById('mqttStatusText').textContent = text
}

function publishFeedback(opt) {
  if (!client || !client.connected) return

  // 1. 发布单条反馈消息（附带来源）
  const msg = JSON.stringify({
    feeling:   opt.feeling,
    emoji:     opt.emoji,
    timestamp: new Date().toISOString(),
    client:    CLIENT_ID,
    source:    SOURCE_LABEL || 'unknown'
  })
  client.publish(TOPIC, msg, { qos: 1 })

  // 2. 更新并发布 retained 统计（看板重新打开时能读到历史总量）
  const stats = loadStats()
  stats[opt.feeling] = (stats[opt.feeling] || 0) + 1
  stats._total = (stats._total || 0) + 1
  saveStats(stats)
  client.publish(TOPIC_STAT, JSON.stringify(stats), { qos: 1, retain: true })

  showToast()
}

function showToast() {
  const t = document.getElementById('sentToast')
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2500)
}

function renderOptions() {
  const grid = document.getElementById('optionsGrid')
  OPTIONS.forEach((opt, i) => {
    const el = document.createElement('div')
    el.className = 'option-card'
    el.innerHTML = `<span class="option-emoji">${opt.emoji}</span><span class="option-text">${opt.feeling}</span><span class="option-desc">${opt.reason.slice(0,12)}...</span>`
    el.onclick = () => {
      selected = i
      document.querySelectorAll('.option-card').forEach((c, idx) => {
        c.classList.toggle('selected', idx === i)
        c.style.borderColor = idx === i ? OPTIONS[i].color : 'transparent'
      })
      document.getElementById('confirmBtn').classList.add('active')
    }
    grid.appendChild(el)
  })
}

function doConfirm() {
  if (selected === -1) return
  const opt = OPTIONS[selected]
  document.getElementById('yfEmoji').textContent = opt.emoji
  document.getElementById('yfText').textContent  = opt.feeling
  document.getElementById('yfText').style.color  = opt.color
  document.getElementById('feedbackCard').style.background = opt.bg
  document.getElementById('fbEmoji').textContent = opt.emoji
  document.getElementById('fbTitle').textContent = opt.feeling
  document.getElementById('fbTitle').style.color = opt.color
  document.getElementById('fbDesc').textContent  = opt.reason
  document.getElementById('clothTip').textContent  = opt.cloth
  document.getElementById('energyTip').textContent = opt.energy
  document.getElementById('selectPage').style.display = 'none'
  document.getElementById('resultPage').classList.add('show')
  publishFeedback(opt)
}

function doReset() {
  selected = -1
  document.querySelectorAll('.option-card').forEach(el => { el.classList.remove('selected'); el.style.borderColor='transparent' })
  document.getElementById('confirmBtn').classList.remove('active')
  document.getElementById('selectPage').style.display = 'flex'
  document.getElementById('resultPage').classList.remove('show')
}

renderOptions()
initMQTT()
</script>
</body>
</html>
